<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Express KG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-theme-button-color: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; padding: 15px; margin: 0; color: #333; }
        .header { text-align: center; padding: 10px 0; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        .card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; align-items: center; padding: 10px; }
        .food-img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; margin-right: 15px; background: #f0f0f0; flex-shrink: 0; }
        .info { flex-grow: 1; }
        .name { font-weight: bold; font-size: 1em; display: block; }
        .price { color: #27ae60; font-weight: bold; font-size: 1.1em; }
        .add-btn { background: #27ae60; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9em; }
        
        .address-section { background: white; padding: 15px; border-radius: 15px; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .status-badge { display: none; text-align: center; padding: 15px; background: #e3f2fd; border-radius: 10px; color: #1976d2; margin-top: 15px; font-weight: bold; border: 1px dashed #1976d2; }
        .order-btn { width: 100%; padding: 18px; background: #3498db; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h2>🚚 Food Express KG</h2>
    </div>

    <!-- Ташкент ашы -->
    <div class="card">
        <img src="https://img.freepik.com/free-photo/uzbek-pilaf-with-meat-in-a-plate_127032-1599.jpg" class="food-img" alt="Плов">
        <div class="info">
            <span class="name">Ташкент ашы</span>
            <span class="price">350с</span>
        </div>
        <button class="add-btn" onclick="add(350, 'Плов')">Кошуу</button>
    </div>

    <!-- Куурулган Лагман -->
    <div class="card">
        <img src="https://img.freepik.com/free-photo/laghman-with-beef-and-vegetables_127032-1602.jpg" class="food-img" alt="Лагман">
        <div class="info">
            <span class="name">Куурулган Лагман</span>
            <span class="price">300с</span>
        </div>
        <button class="add-btn" onclick="add(300, 'Лагман')">Кошуу</button>
    </div>

    <!-- Бешбармак -->
    <div class="card">
        <img src="https://img.freepik.com/free-photo/national-kazakh-dish-beshbarmak-with-meat-and-onions_127032-1605.jpg" class="food-img" alt="Бешбармак">
        <div class="info">
            <span class="name">Кыргызча Бешбармак</span>
            <span class="price">600с</span>
        </div>
        <button class="add-btn" onclick="add(600, 'Бешбармак')">Кошуу</button>
    </div>

    <!-- Лимон чайы -->
    <div class="card">
        <img src="https://img.freepik.com/free-photo/cup-of-tea-with-lemon-and-honey_127032-1921.jpg" class="food-img" alt="Чай">
        <div class="info">
            <span class="name">Лимон чайы</span>
            <span class="price">80с</span>
        </div>
        <button class="add-btn" onclick="add(80, 'Чай')">Кошуу</button>
    </div>

    <div class="address-section">
        <strong>Жеткирүү дареги:</strong>
        <input type="text" id="address" placeholder="Мисалы: Тынчтык пр. 10, кв 5">
    </div>

    <div id="status" class="status-badge">⏳ Заказ кабыл алынды... Курьер дайындалууда.</div>

    <button id="mainBtn" class="order-btn" onclick="sendData()">Заказды тариздөө: 0с</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let total = 0;
        let items = [];

        function add(price, name) {
            total += price;
            items.push(name);
            let btn = document.getElementById('mainBtn');
            btn.style.display = 'block';
            btn.innerText = `Заказды тариздөө: ${total}с`;
            tg.HapticFeedback.impactOccurred('medium'); 
        }

        function sendData() {
            let addr = document.getElementById('address').value;
            if (!addr) {
                alert("Сураныч, даректи жазыңыз!");
                return;
            }

            let data = {
                total_price: total,
                goods: items.join(", "),
                address: addr
            };

            document.getElementById('status').style.display = 'block';
            document.getElementById('mainBtn').style.display = 'none';

            setTimeout(() => {
                tg.sendData(JSON.stringify(data));
                tg.close();
            }, 2000); 
        }
    </script>
</body>
</html>
